{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{{ mymodel.base_title }}</title>
    <link rel="stylesheet" href="{% static 'css/logreg.css' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
</head>
<body>
<div class="container py-3">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="auth-card">
                <div class="row g-0 h-300">
                    <div class="col-lg-6">
                        <div class="form-aside">
                            <div class="text-center mb-4">
                                <img src="{{ mymodel.logo.url }}" alt="{{ mymodel.website_title }}" width="130"
                                     height="40">
                                <h3 class="mt-4 fw-bold">
                                    Wellcome Back!
                                </h3>
                                <p class="text-muted">
                                    Access your peronalizes news experiens
                                </p>
                            </div>
                            <ul class="nav auth-tabs mb-4">
                                <li class="nav-item flex-fill">
                                    <bottom class="nav-link active w-100"
                                            data-bs-toggle="tab"
                                            data-bs-target="#login-tab"
                                    >Login
                                    </bottom>
                                </li>
                                 <li class="nav-item flex-fill">
                                    <bottom class="nav-link w-100"
                                            data-bs-toggle="tab"
                                            data-bs-target="#register-tab"
                                    >Register
                                    </bottom>
                                </li>
                            </ul>
                            <div class="tab-content">
                                <div class="tab-pane fade show active" id="login-tab">
                                    <form action="#" method="post">
                                        <div class="mb-3">
                                            <input type="email" class="form-control nf-input"
                                            placeholder="Email Adress">
                                        </div>
                                        <div class="mb-3">
                                            <input type="password" class="form-control nf-input"
                                            placeholder="password">
                                        </div>
                                    </form>


                                </div>


                                <div class="tab-pane fade show active" id="register-tab">
                                    Register Tab
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
